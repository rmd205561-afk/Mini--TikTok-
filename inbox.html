<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTok - Professional Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; margin: 0; }
        .page { display: none; height: 100vh; width: 100%; position: absolute; top: 0; }
        .active-page { display: block; }
        .video-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-card { scroll-snap-align: start; height: 100vh; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input::placeholder { color: #999; }
    </style>
</head>
<body>

    <div id="login-page" class="page active-page flex items-center justify-center bg-black">
        <div class="glass p-10 rounded-[45px] text-center max-w-sm w-full shadow-2xl mx-4">
            <h1 class="text-6xl font-black mb-2 italic tracking-tighter text-white">NexTok</h1>
            <p class="text-gray-500 mb-10 text-[10px] uppercase font-bold tracking-[0.3em]">Next Gen Social</p>
            
            <div class="space-y-3 mb-6">
                <input type="text" id="login-user" placeholder="Username or Email" class="w-full bg-white/5 border border-white/10 py-4 px-6 rounded-2xl outline-none text-white focus:border-cyan-400 transition text-sm">
                <input type="tel" id="login-phone" placeholder="Phone Number" class="w-full bg-white/5 border border-white/10 py-4 px-6 rounded-2xl outline-none text-white focus:border-cyan-400 transition text-sm">
            </div>

            <button onclick="handleCustomLogin()" class="w-full bg-cyan-400 text-black py-4 rounded-2xl font-black mb-4 active:scale-95 transition">Login / Sign Up</button>
            
            <div class="flex items-center my-6"><div class="flex-1 h-[1px] bg-white/10"></div><span class="px-3 text-gray-500 text-[10px] font-bold">OR</span><div class="flex-1 h-[1px] bg-white/10"></div></div>

            <button onclick="login()" class="w-full bg-white text-black py-4 rounded-2xl font-black flex items-center justify-center gap-3 active:scale-95 transition text-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5"> Continue with Google
            </button>
        </div>
    </div>

    <div id="home-page" class="page">
        <div id="video-feed" class="video-container"></div>
    </div>

    <div id="profile-page" class="page bg-white text-black overflow-y-auto pb-24">
        <div class="flex justify-between p-5 items-center sticky top-0 bg-white z-10">
            <i class="fas fa-user-plus text-xl"></i>
            <div class="flex items-center gap-2 font-bold"><span id="top-username">Username</span> <i class="fas fa-chevron-down text-[10px]"></i></div>
            <i class="fas fa-bars text-xl"></i>
        </div>

        <div class="text-center px-6">
            <div class="relative w-24 h-24 mx-auto mb-4">
                <img id="user-img" src="https://via.placeholder.com/150" class="w-full h-full rounded-full border shadow-sm object-cover">
                <div class="absolute bottom-0 right-0 bg-cyan-400 text-white p-1 rounded-full border-2 border-white shadow-sm"><i class="fas fa-plus text-[10px]"></i></div>
            </div>
            
            <h2 id="display-name-view" class="text-xl font-bold">User Name</h2>
            <p id="display-handle-view" class="text-gray-500 text-sm mb-6">@username</p>
            
            <div class="flex justify-center gap-10 mb-8">
                <div class="text-center"><b id="following-count" class="text-lg">0</b><p class="text-gray-400 text-[11px] font-bold uppercase">Following</p></div>
                <div class="text-center"><b id="follower-count" class="text-lg">0</b><p class="text-gray-400 text-[11px] font-bold uppercase">Followers</p></div>
                <div class="text-center"><b id="likes-count" class="text-lg">0</b><p class="text-gray-400 text-[11px] font-bold uppercase">Likes</p></div>
            </div>

            <div class="flex gap-2 mb-6">
                <button onclick="openEditModal()" class="flex-1 bg-gray-100 py-3 rounded-lg font-bold text-sm">Edit profile</button>
                <button class="bg-gray-100 px-5 py-3 rounded-lg font-bold text-sm">Friends</button>
            </div>

            <div class="text-sm text-gray-600 space-y-2 mb-8">
                <p id="user-bio" class="italic">Spill the tea...</p>
                <div class="flex justify-center gap-4 text-xs font-bold mt-3">
                    <span class="text-red-500"><i class="fas fa-phone mr-1"></i> Phone</span>
                    <span class="text-pink-500"><i class="fas fa-map-marker-alt mr-1"></i> Address</span>
                    <span class="text-purple-500"><i class="fas fa-envelope mr-1"></i> Email</span>
                </div>
            </div>

            <div class="border-t flex justify-around py-4 text-gray-400 sticky top-[60px] bg-white">
                <i class="fas fa-th-large text-black border-b-2 border-black pb-2 px-6"></i>
                <i class="fas fa-lock"></i>
                <i class="fas fa-heart"></i>
            </div>
            
            <div id="user-video-grid" class="grid grid-cols-3 gap-1 mt-1">
                <div class="bg-gray-100 aspect-[3/4]"></div><div class="bg-gray-100 aspect-[3/4]"></div><div class="bg-gray-100 aspect-[3/4]"></div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-md border-t border-white/5 flex justify-around items-center py-6 text-white z-[100]">
        <i class="fas fa-home text-2xl" onclick="showPage('home-page')"></i>
        <i class="fas fa-search text-2xl opacity-40"></i>
        <div class="bg-white text-black px-5 py-1.5 rounded-xl"><i class="fas fa-plus font-black"></i></div>
        <i class="fas fa-comment-dots text-2xl opacity-40"></i>
        <i class="fas fa-user text-2xl opacity-40" onclick="showPage('profile-page')"></i>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "nextok-f84be.firebaseapp.com",
            projectId: "nextok-f84be",
            storageBucket: "nextok-f84be.firebasestorage.app",
            messagingSenderId: "1056586071060",
            appId: "1:1056586071060:web:80373801f926065529f5f0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                checkUserAccount(user);
            } else {
                showPage('login-page');
            }
        });

        // অ্যাকাউন্ট চেক এবং রিয়েল-টাইম ডাটাবেস সেটআপ
        async function checkUserAccount(user, customName = null) {
            const userRef = doc(db, "Users", user.uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    name: customName || user.displayName || "NexToker",
                    uid: user.uid,
                    photoURL: user.photoURL || "https://via.placeholder.com/150",
                    followers: 0,
                    following: 0,
                    likes: 0,
                    createdAt: serverTimestamp()
                });
            }
            
            showPage('home-page'); // লগইন সফল হলে সরাসরি হোমে যাবে
            loadRealTimeProfile(user.uid);
        }

        window.login = () => signInWithPopup(auth, provider);

        window.handleCustomLogin = () => {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-phone').value;
            if(!u || !p) return alert("Username & Phone required!");
            checkUserAccount({ uid: "user_"+p, displayName: u, photoURL: "" }, u);
        };

        function loadRealTimeProfile(uid) {
            onSnapshot(doc(db, "Users", uid), (d) => {
                if(d.exists()){
                    const data = d.data();
                    document.getElementById('display-name-view').innerText = data.name;
                    document.getElementById('top-username').innerText = data.name;
                    document.getElementById('follower-count').innerText = data.followers;
                    document.getElementById('following-count').innerText = data.following;
                    document.getElementById('likes-count').innerText = data.likes;
                    document.getElementById('user-img').src = data.photoURL;
                }
            });
        }

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        };
    </script>
</body>
</html>
